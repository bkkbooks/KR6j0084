body:
  text: 夫欲修行陀羅尼法先須嚴飾道場內外清潔衣服鮮淨離諸喧雜及諸戲論依念誦法則四時不闕若闕一時及違法則即從違闕後起首作法已前縱欲滿功唯缺一時其時虧缺亦總不成要須終始無犯方論遍數其遍數準當部本尊自有次第遍數訖已自有境界或恐念誦之時違三昧耶心不專的妄有緣起所以不能相應故淨境不即現前專修行人每月隨部必須隨力供養闕供養故亦非相應隨部者謂如來部十五日菩薩部十四日金剛部八日諸天部五日藥叉部四日也供養法皆用日初出時辨壇食甘美香脆餅食脂油細食著銜蒸作乳粥酪飱加之酥蜜種種妙饌隨力供養皆別盤中種種奠豆作食之時及將入道場皆用軍荼利心明及又印印諸供具明曰唵阿𤙖密㗚二合多𤙖㧊吒半音事事皆呪三遍或七遍所以免諸飛行羅剎之所盜竊若不作意多有觸穢諸使者等不生隨喜遂障成就夫結界護身必須迅速不得遲疑猶豫恐被捷疾藥叉來相嬈惱是以結護及供養時極須嚴備事須迅速夫供養時先須洗浴清潔於道場外香水灑身然後稱吽字三聲即右手作金剛拳觀想聖衆遍滿道場如影重重不相妨礙即禮三拜誦外儀九遍次誦大輪金剛真言三七遍是懺悔法金剛合掌雙膝著地次想㘕字焚殄世界令如灰塵次想唅字猶如黑風飄激令淨無復塵淨次想鑁字門想同乳水清徹皎鏡復於其上想蘇字門成妙高山山下乳海彌漫法界山上平坦果林芬葩水木清華澄湛照灼次執香爐焚香運想於妙高山上百寶廣殿寶柱無邊寶剎懸幡寶幢之上有半月輪輪上耀摩尼寶珠行列遍布矜羯羅網絞絡其間謂帝釋綱皆是寶珠珠珠相射瑩映明徹復觀阿字成窣覩婆復想靈塔成大日尊坐寶蓮華正中謂正殿中跏坐四面羅列億億蓮花一一花中皆坐聖者謂十方佛來作證明菩薩金剛侍衛前後二乘諸衆無量無邊天龍充塞難可齊限其上空際雅樂妙音清冷悅情廣作佛事謂淨居諸天作妙妙樂諸衆左右賢瓶閼伽閼伽香水商佉壞也香雲寶花繽紛亂下香餐珍膳流溢寶盤芳果殊漿美味酷烈寶衣製曳光曜中場珠炬曦暉衆色交映如是運想已次依念誦法至本尊真言略誦多少百八遍或三七次以虛空明妃及廣大等真言加持飲食此則名為法供養供養訖依念誦法撥遣一百八遍其火𤙖法一依前法護持及念誦法則且其火法略有四種第一扇底迦法應當北面爐法圓作其諸供具皆悉白色大約普賢為主然當部自有對法也此謂息災滅罪衣服及畫像等皆悉白色第二補瑟微迦法應當東面爐法方作其諸供具皆悉黃色大約觀音為主此謂成就滿願及諸勝事第三阿毗遮魯迦法應當南面爐法三角其諸供具皆悉赤色大約金剛手為主第四擯必孕反迦羅法應當西面爐法八角如蓮華葉其諸供養皆紫檀色此謂欲見大人求敬愛法已前四爐皆方一肘小尺一尺八寸深則半之爐底一以泥捏作獨股杵杵長八指其圓爐及八角爐即作羯磨跋折羅謂十字跋折羅爐脣皆作三重從內高向外漸低每重皆闊四指都闊十二指脣緣之上任畫作花如不能畫即觀想作之其火木及香花等物並置右邊每日三時日出時人定時後夜時時別一百八遍火木用穀木及夜合木桑木柏木松木等其木每破削大如中指長十二指無令節類須條直取中色小樹不用老枯樹及有蟲者採取之時必須看有好相方採若見不孝子及不具足人婦人惡禽獸等並不須採即別覓之每一時用一百八枚於爐右邊作并欄疊之塗香法用白檀香一塊半斤以來者於石上用淨水磨之兼沈香少分更磨之又用鬱金少分以沈香研磨令細又用龍腦亦少分如無龍惱鬱金單用檀香亦得也閼伽法以淨濾水取少計塗香點淨水中妙好淨華著此水中亦精須新淨瓷碗盛之又用香水一瓶當於坐前對爐置之火供養左手執杵按之丸香法沈香二兩淺香八兩蘇合三兩香附子一兩安悉香二兩熏陸香二兩青木香一兩㢇唐二兩白檀香二兩龍腦香一分鬱金香一分麝香一分已上三物同一處研甲香二兩漿水煮洗蜜和炒令乾別搗之右和合以鍊蜜得所最後入龍腦等三味如鄉土難得隨得辨秣香法甘松二兩零陵香二兩芎藭二兩丁香一兩澤蘭二兩沈香一兩好淺三兩已上共搗蘇合二兩龍腦鬱金麝香各半分別絹袋盛著諸秣中了白芥子別盛三味法酥蜜酪每時各三四計酪則減半相和一銅盆盛之五穀法稻穀花糤米油煮及染作紫赤黃等色名為稻穀華盛于一器油麻菉豆小豆小麥粳米已上相和別盛一器常合香法謂龍腦如無合白豆䓻子一兩粒亦得如無丁香亦得供養火食爐食及乾棗栗黃沙糖石蜜隨力辨具初供養召請結界護身一如前列結界時加地橛金剛牆金剛網金剛火焰無動刀印明等召請時各各召請八方護法天王各誦七遍同用金剛召請印先供養火天明三味三杓五穀丸香安悉香等然後運心普供養五部聖衆誦廣大真言及虛空明妃真言等次誦本尊真言燒火木兩頭搵三味誦一遍即擲爐中仍須定志安詳不得卒暴矣次投火木總畢即燒五穀每至娑嚩訶前加所祈法謂某甲扇底迦娑縛訶也數以香水遍灑諸物及火等灑水時誦軍荼利心中心明初燃火真言曰唵部𠷈惹嚩三合邏三七遍以扇扇火不得口吹其火於寺內淨處者不得取俗家煮炙葷穢之火不然即須別鑽取仍不得口吹用兩香爐軍荼右邊燒丸香及沈香軍荼左邊燒安悉香或熏陸或白膠香其供養物數隨時豐約豐則不可多燒約則不可令闕如不能供養辨但於後夜及以晨朝運心廣獻多誦廣大及虛空明妃亦得擲木燒火應看火相火色法須白黃赤若黑色及青色並惡又聽火聲謂音樂悅意聲者善若猪狗及以驢騾鳥梟等聲者不善又發焰掣曳流利者善若熅勃煙鬱衝人者不善或爆吒迸散者亦非善相善相之法不令人熱其炭仍須端直調均應用香水遍洗皆長十二指以來其八天真言及火天真言已別録具火色若吉則可燒爐果子充供養火色若不善即不須燒燒火供養七日為限如事不獲已三七日亦得此火供養法以資念誦令速成就其阿毗遮魯迦等亦不應為為求成就妨大緣故或於觀想及夢寐之間所遇境界如經廣明此不具述火法又不速成即應加部母真言雙誦又經三七日來加部母真言不遂本志即印塔每日一千遍又經三七日必果志矣其塔印長一肘亦應自須籌量自力多少業行精微雖有課數而秉護麁疏亦非相應事須三業調柔事法淳熟自須觀察與理相應自感聖者猶如明鏡自現鏡像
